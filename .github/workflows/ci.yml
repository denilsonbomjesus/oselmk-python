# CI — lint and test
#
# Runs on every push and pull_request targeting main.
#
# Jobs
# ----
# lint   : ruff check + ruff format --check (Python 3.12 only)
# test   : pytest --cov=src/oselmk across Python 3.10, 3.11, 3.12
#
# The test matrix only starts if lint passes.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # --------------------------------------------------------------------------
  # lint
  # --------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Upgrade pip / setuptools / wheel
        # Ensures setuptools.backends.legacy (requires setuptools >= 69)
        # is available before the editable install attempt.
        run: pip install --upgrade pip setuptools wheel

      - name: Install package with dev extras
        run: pip install -e ".[dev]"

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

  # --------------------------------------------------------------------------
  # test
  # --------------------------------------------------------------------------
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Upgrade pip / setuptools / wheel
        # Same fix applied to every matrix node.
        run: pip install --upgrade pip setuptools wheel

      - name: Install package with dev extras
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest --cov-report=html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: htmlcov/
          retention-days: 14
          if-no-files-found: warn
