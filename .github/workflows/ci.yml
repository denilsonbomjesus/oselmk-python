# CI — lint and test
#
# Runs on every push and pull_request targeting main.
#
# Jobs
# ----
# lint   : ruff check + ruff format --check (Python 3.12 only — version-
#          independent for target-version = py310 set in pyproject.toml)
# test   : pytest --cov=src/oselmk across Python 3.10, 3.11, 3.12
#
# The test matrix only starts if lint passes, avoiding wasted runner
# minutes on commits with obvious style / import errors.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same branch so fast-forward pushes
# don't queue up stale jobs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # --------------------------------------------------------------------------
  # lint
  # --------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install package with dev extras
        # Installs ruff (declared in [project.optional-dependencies] dev)
        # plus the runtime deps (numpy, scipy) so ruff can resolve imports.
        run: pip install -e ".[dev]"

      - name: ruff check
        # Uses [tool.ruff] / [tool.ruff.lint] config from pyproject.toml.
        # select = ["E", "F", "W", "I", "N", "UP", "B", "SIM"]
        # ignore  = ["E501"]  (line-length enforced by ruff format, not check)
        run: ruff check .

      - name: ruff format --check
        # Does NOT rewrite files — exits with code 1 if any file would change.
        # Keeps formatting concerns separate from lint concerns so error
        # messages point to the right issue.
        run: ruff format --check .

  # --------------------------------------------------------------------------
  # test
  # --------------------------------------------------------------------------
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint          # only run if lint passes

    strategy:
      fail-fast: false   # let all three versions finish even if one fails,
                         # so you see the full compatibility picture at once
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install package with dev extras
        # Editable install so pytest resolves src/oselmk without PYTHONPATH
        # tricks.  The -e flag also means changes to __init__.py are live
        # without reinstalling.
        run: pip install -e ".[dev]"

      - name: Run pytest
        # pytest args come from [tool.pytest.ini_options] in pyproject.toml:
        #   testpaths  = ["tests"]
        #   addopts    = "--cov=src/oselmk --cov-report=term-missing -v"
        # Generates .coverage (SQLite) and an HTML report in htmlcov/.
        run: pytest --cov-report=html

      - name: Upload coverage report
        # Makes the per-version HTML coverage report downloadable from the
        # GitHub Actions summary page without needing an external service.
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: htmlcov/
          retention-days: 14
          # Don't fail the job if htmlcov/ wasn't generated (e.g. no tests
          # exist yet — graceful degradation).
          if-no-files-found: warn
